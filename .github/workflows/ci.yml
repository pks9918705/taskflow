name: CI / CD

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ─── 1. Tests ────────────────────────────────────────────────────────────────

  test-backend:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/taskdb

      - name: Run unit tests
        working-directory: backend
        run: npm test

  build-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000/api

  # ─── 2. Build & Push to Docker Hub (main branch only) ────────────────────────

  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── 3. Deploy to VPS ────────────────────────────────────────────────────────

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Copy production compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: docker-compose.prod.yml
          target: /opt/taskflow

      - name: Pull images and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd /opt/taskflow
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

  # ─── 4. Notify via Email ─────────────────────────────────────────────────────

  notify-success:
    name: Send Deployment Email
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Send success email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Deployment Successful — TaskFlow (${{ github.ref_name }})"
          to: priyanshu@fyllo.in
          from: TaskFlow CI <${{ secrets.MAIL_USERNAME }}>
          html_body: |
            <h2>Deployment Successful</h2>
            <table cellpadding="6" style="font-family:sans-serif;font-size:14px">
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Commit</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>Author</b></td><td>${{ github.actor }}</td></tr>
              <tr><td><b>Message</b></td><td>${{ github.event.head_commit.message }}</td></tr>
              <tr><td><b>Triggered at</b></td><td>${{ github.event.head_commit.timestamp }}</td></tr>
            </table>
            <br>
            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View workflow run</a>
            </p>

  notify-failure:
    name: Send Failure Email
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend, build-and-push, deploy]
    if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Deployment FAILED — TaskFlow (${{ github.ref_name }})"
          to: priyanshu@fyllo.in
          from: TaskFlow CI <${{ secrets.MAIL_USERNAME }}>
          html_body: |
            <h2 style="color:red">Deployment Failed</h2>
            <table cellpadding="6" style="font-family:sans-serif;font-size:14px">
              <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
              <tr><td><b>Commit</b></td><td>${{ github.sha }}</td></tr>
              <tr><td><b>Author</b></td><td>${{ github.actor }}</td></tr>
              <tr><td><b>Message</b></td><td>${{ github.event.head_commit.message }}</td></tr>
            </table>
            <br>
            <p>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">View workflow run & logs</a>
            </p>
